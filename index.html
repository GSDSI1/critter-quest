<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Critter Quest</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #0f0f1a;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #game-container {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
      }
      canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
      #load-error {
        display: none;
        position: fixed; inset: 0;
        align-items: center; justify-content: center;
        background: #0f0f1a; color: #f5c542;
        font-family: "Courier New", monospace;
        text-align: center; padding: 2rem; z-index: 9999;
      }
      #load-error.visible { display: flex; flex-direction: column; gap: 1rem; }
      #load-error p { color: #8899aa; font-size: 14px; max-width: 420px; line-height: 1.5; }
      #load-error code { color: #c0c0c0; background: #16213e; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="load-error" role="alert">
      <strong>Critter Quest failed to load</strong>
      <p id="load-error-msg">The game script could not start. Make sure the dev server is running:</p>
      <p><code>npm run dev</code> then open <code>http://127.0.0.1:5180</code></p>
    </div>
    <div id="game-container"></div>
    <script>
      window.addEventListener('error', function (e) {
        var el = document.getElementById('load-error');
        var msg = document.getElementById('load-error-msg');
        if (el) el.classList.add('visible');
        if (msg && e.message) msg.textContent = e.message;
      });
      window.addEventListener('unhandledrejection', function (e) {
        var el = document.getElementById('load-error');
        var msg = document.getElementById('load-error-msg');
        if (el) el.classList.add('visible');
        if (msg && e.reason) msg.textContent = String(e.reason);
      });
      setTimeout(function () {
        if (!document.querySelector('#game-container canvas')) {
          var el = document.getElementById('load-error');
          if (el && !el.classList.contains('visible')) {
            el.classList.add('visible');
          }
        }
      }, 12000);
      // Hide error overlay once Phaser canvas mounts (stale overlay blocked E2E clicks)
      var hideErrorIfReady = function () {
        if (document.querySelector('#game-container canvas')) {
          var el = document.getElementById('load-error');
          if (el) el.classList.remove('visible');
        }
      };
      setInterval(hideErrorIfReady, 250);
      hideErrorIfReady();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
